# ARCH-06 fix: Removed unused postgres and redis services.
# This project uses MongoDB (via Atlas) + Firebase. Postgres and Redis
# were left over from an initial scaffold and are not used.
#
# To run MongoDB locally for development:
#   docker run -d -p 27017:27017 --name subtitleai-mongo mongo:7
#
# Or use MongoDB Atlas (recommended for production).

version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: subtitleai-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
